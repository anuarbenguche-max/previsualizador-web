<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuar Code Previewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --card-bg: #1e1f20;
            --text-main: #e3e3e3;
            --text-dim: #b4b4b4;
            --code-text: #a0a0a0; /* Gris oscuro para el código */
            --accent-blue: #0070ba;
            --border-radius: 8px; /* Redondez sutil */
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Lato', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 900; /* Fuente gruesa */
            margin: 0;
            letter-spacing: -0.5px;
        }

        .btn-paypal {
            background-color: var(--accent-blue);
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: var(--border-radius);
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-paypal:hover { transform: scale(1.02); }

        /* Contenedor Principal Responsive */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas en PC */
            gap: 20px;
            padding: 0 30px 30px 30px;
            flex: 1;
            overflow: hidden;
        }

        /* Columna de Editores */
        .editors-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
        }

        .editor-box {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            flex: 1; /* Todos el mismo tamaño */
            display: flex;
            flex-direction: column;
            min-height: 150px;
        }

        .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: 1.5px;
        }

        textarea {
            background: transparent;
            border: none;
            color: var(--code-text);
            font-family: 'Consolas', monospace;
            font-size: 14px;
            flex: 1;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        /* Vista Previa */
        .preview-column {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* RESPONSIVE: Ajustes para tablets y móviles */
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr; /* Una sola columna */
                overflow-y: auto;
            }
            body { overflow-y: auto; height: auto; }
            .preview-column { min-height: 400px; order: -1; } /* Vista previa arriba en móvil */
            .editors-column { height: auto; }
        }
    </style>
</head>
<body>

<header>
    <h1>Anuar Code Previewer</h1>
    <a href="https://paypal.me/abenguche" target="_blank" class="btn-paypal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg>
        DONAR CON PAYPAL
    </a>
</header>

<div class="main-layout">
    <div class="editors-column">
        <div class="editor-box">
            <div class="label">HTML</div>
            <textarea id="html-code" placeholder="Escribe HTML..."></textarea>
        </div>
        <div class="editor-box">
            <div class="label">CSS</div>
            <textarea id="css-code" placeholder="Escribe CSS..."></textarea>
        </div>
        <div class="editor-box">
            <div class="label">JAVASCRIPT</div>
            <textarea id="js-code" placeholder="Escribe JS..."></textarea>
        </div>
    </div>

    <div class="preview-column">
        <iframe id="preview-iframe"></iframe>
    </div>
</div>

<script>
    const htmlEditor = document.getElementById('html-code');
    const cssEditor = document.getElementById('css-code');
    const jsEditor = document.getElementById('js-code');
    const preview = document.getElementById('preview-iframe');

    function update() {
        const doc = preview.contentDocument || preview.contentWindow.document;
        doc.open();
        doc.write(`<html><head><style>${cssEditor.value}</style></head><body>${htmlEditor.value}<script>${jsEditor.value}<\/script></body></html>`);
        doc.close();
    }

    [htmlEditor, cssEditor, jsEditor].forEach(el => el.addEventListener('input', update));

    // Código inicial de ejemplo
    htmlEditor.value = "<h1>Hola desde mi móvil</h1>\n<p>Este editor es responsive.</p>";
    cssEditor.value = "body { display: flex; justify-content: center; align-items: center; height: 80vh; color: #555; }";
    update();
</script>

</body>
</html>
