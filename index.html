<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online Code Previewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --card-bg: #1e1f20;
            --header-dark: #0f0f0f;
            --text-main: #e3e3e3;
            --text-dim: #b4b4b4;
            --code-text: #a0a0a0;
            --accent-blue: #0070ba; 
            --accent-red: #cc2929;
            --border-line: #2a2a2a;
            --border-radius: 8px;
            --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.6);
            --shadow-strong: 0 15px 45px rgba(0, 0, 0, 0.8);
            --preview-light: #f5f5f5;
            --preview-dark: #1e1f20;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Lato', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.3rem; font-weight: 900; margin: 0; letter-spacing: -0.5px; color: #fff; }
        
        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .actions-group { display: flex; gap: 12px; }
        .eye-care-note { font-size: 0.65rem; font-style: italic; color: var(--text-dim); opacity: 0.7; font-weight: 300; }

        .btn { padding: 8px 18px; text-decoration: none; border-radius: var(--border-radius); font-weight: 700; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; border: none; cursor: pointer; color: white; }
        .btn-download { background-color: #303136; border: 1px solid var(--border-line); }
        .btn-paypal { background-color: var(--accent-blue); }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px 20px 20px; flex: 1; overflow: hidden; }

        .editors-column { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .editor-box { background: var(--card-bg); border-radius: var(--border-radius); flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border-line); box-shadow: var(--shadow-soft); }
        .editor-header { background: var(--header-dark); padding: 10px 15px; border-bottom: 2px solid var(--border-line); }
        .label { font-size: 0.6rem; color: var(--text-dim); font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; }
        textarea { background: transparent; border: none; color: var(--code-text); font-family: 'Consolas', monospace; font-size: 13px; flex: 1; padding: 12px; resize: none; outline: none; line-height: 1.6; }

        .preview-container { display: flex; flex-direction: column; height: 100%; border-radius: var(--border-radius); border: 1px solid var(--border-line); box-shadow: var(--shadow-soft); overflow: hidden; position: relative; }
        .tabs-bar { background: var(--header-dark); display: flex; align-items: center; padding-right: 15px; border-bottom: 2px solid var(--border-line); justify-content: space-between; }
        
        .tabs-wrapper { display: flex; align-items: center; overflow-x: auto; flex: 1; }
        .tab { padding: 12px 15px; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid transparent; transition: 0.2s; min-width: 110px; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent-blue); background: rgba(255,255,255,0.05); }
        .tab span { outline: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .close-tab { font-size: 10px; opacity: 0.3; transition: 0.2s; padding: 2px 4px; border-radius: 4px; }
        .close-tab:hover { opacity: 1; background: var(--accent-red); color: white; }

        .controls-group { display: flex; align-items: center; gap: 15px; }
        .add-tab { font-size: 1.4rem; color: var(--text-dim); cursor: pointer; transition: 0.3s; }
        .add-tab:hover { color: white; transform: scale(1.1); }
        .add-tab.disabled { opacity: 0.1; cursor: not-allowed; }

        .theme-btn { cursor: pointer; display: flex; align-items: center; opacity: 0.6; transition: 0.3s; }
        .theme-btn:hover { opacity: 1; }
        .theme-btn svg { width: 16px; height: 16px; stroke: white; }

        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .preview-container { min-height: 400px; order: -1; } .eye-care-note { text-align: center; } }
    </style>
</head>
<body>

<header>
    <h1>Free Online Code Previewer</h1>
    <div class="header-right">
        <div class="actions-group">
            <button class="btn btn-download" onclick="downloadCurrentTab()">DESCARGAR .HTML</button>
            <a href="https://paypal.me/abenguche" target="_blank" class="btn btn-paypal">DONAR CON PAYPAL</a>
        </div>
        <span class="eye-care-note">Usamos modo oscuro para cuidar tus ojos. Puedes cambiarlo en la barra de proyectos.</span>
    </div>
</header>

<div class="main-layout">
    <div class="editors-column">
        <div class="editor-box">
            <div class="editor-header"><div class="label">HTML</div></div>
            <textarea id="html-code"></textarea>
        </div>
        <div class="editor-box">
            <div class="editor-header"><div class="label">CSS</div></div>
            <textarea id="css-code"></textarea>
        </div>
        <div class="editor-box">
            <div class="editor-header"><div class="label">JS</div></div>
            <textarea id="js-code"></textarea>
        </div>
    </div>

    <div class="preview-container" id="preview-wrapper">
        <div class="tabs-bar">
            <div class="tabs-wrapper" id="tabs-list">
                </div>
            <div class="controls-group">
                <div class="theme-btn" onclick="toggleTheme()" id="theme-btn" title="Cambiar luz/oscuridad">
                    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><path d="M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                </div>
                <div class="add-tab" id="add-btn" onclick="createNewTab()">+</div>
            </div>
        </div>
        <iframe id="preview-iframe"></iframe>
    </div>
</div>

<script>
    let tabs = [];
    let activeTabId = null;
    let isDarkMode = true; 
    const MAX_TABS = 5;

    const htmlInput = document.getElementById('html-code');
    const cssInput = document.getElementById('css-code');
    const jsInput = document.getElementById('js-code');
    const preview = document.getElementById('preview-iframe');
    const tabsList = document.getElementById('tabs-list');
    const addBtn = document.getElementById('add-btn');
    const themeIcon = document.getElementById('theme-icon');

    function createNewTab() {
        if (tabs.length >= MAX_TABS) return;
        let num = 1;
        while(tabs.some(t => t.name === `Proyecto ${num}`)) { num++; }
        const id = Date.now();
        tabs.push({
            id: id,
            name: `Proyecto ${num}`,
            html: "<h1>Hola mundo</h1>",
            css: "body {\n  font-family: 'Lato', sans-serif;\n  text-align: center;\n  padding-top: 50px;\n}",
            js: ""
        });
        renderTabs();
        switchTab(id);
        checkLimit();
    }

    function renderTabs() {
        tabsList.innerHTML = "";
        tabs.forEach(tab => {
            const tabEl = document.createElement('div');
            tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
            tabEl.onclick = () => switchTab(tab.id);
            tabEl.ondblclick = () => enableEdit(tab.id, tabEl.querySelector('span'));
            tabEl.innerHTML = `
                <span onblur="disableEdit(${tab.id}, this)" onkeydown="checkEnter(event, this)">${tab.name}</span>
                <div class="close-tab" onclick="closeTab(${tab.id}, event)">✕</div>
            `;
            tabsList.appendChild(tabEl);
        });
    }

    function enableEdit(id, span) {
        span.contentEditable = true;
        span.focus();
        document.execCommand('selectAll', false, null);
    }

    function disableEdit(id, span) {
        span.contentEditable = false;
        const tab = tabs.find(t => t.id === id);
        if (tab) tab.name = span.innerText.trim() || "Proyecto";
        renderTabs();
    }

    function checkEnter(e, span) { if (e.key === 'Enter') { e.preventDefault(); span.blur(); } }

    function switchTab(id) {
        if (activeTabId) saveState();
        activeTabId = id;
        const tab = tabs.find(t => t.id === id);
        if (tab) {
            htmlInput.value = tab.html;
            cssInput.value = tab.css;
            jsInput.value = tab.js;
            renderTabs();
            updatePreview();
        }
    }

    function saveState() {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) {
            tab.html = htmlInput.value;
            tab.css = cssInput.value;
            tab.js = jsInput.value;
        }
    }

    function closeTab(id, e) {
        e.stopPropagation();
        tabs = tabs.filter(t => t.id !== id);
        if (tabs.length === 0) createNewTab();
        else if (activeTabId === id) switchTab(tabs[0].id);
        else renderTabs();
        checkLimit();
    }

    function checkLimit() {
        tabs.length >= MAX_TABS ? addBtn.classList.add('disabled') : addBtn.classList.remove('disabled');
    }

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        themeIcon.innerHTML = isDarkMode ? 
            '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><path d="M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>' : 
            '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        updatePreview();
    }

    function updatePreview() {
        const doc = preview.contentDocument || preview.contentWindow.document;
        const bg = isDarkMode ? "#1e1f20" : "#f5f5f5";
        const defaultTextColor = isDarkMode ? "#e3e3e3" : "#333"; // Detección automática del texto
        
        document.getElementById('preview-wrapper').style.background = bg;

        doc.open();
        doc.write(`
            <html>
            <head>
                <style>
                    body { 
                        background: ${bg}; 
                        color: ${defaultTextColor}; 
                        margin: 0; 
                        min-height: 100vh; 
                        transition: color 0.3s, background 0.3s; 
                    }
                    ${cssInput.value}
                </style>
            </head>
            <body>
                ${htmlInput.value}
                <script>${jsInput.value}<\/script>
            </body>
            </html>
        `);
        doc.close();
    }

    [htmlInput, cssInput, jsInput].forEach(el => el.addEventListener('input', () => { saveState(); updatePreview(); }));

    function downloadCurrentTab() {
        const tab = tabs.find(t => t.id === activeTabId);
        const code = `<!DOCTYPE html><html><head><style>body{background:${isDarkMode?'#1e1f20':'#f5f5f5'};color:${isDarkMode?'#e3e3e3':'#333'};}${cssInput.value}</style></head><body>${htmlInput.value}<script>${jsInput.value}<\/script></body></html>`;
        const blob = new Blob([code], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${tab.name}.html`;
        a.click();
    }

    createNewTab(); 
</script>
</body>
</html>
