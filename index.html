<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online Code Previewer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1014;
            --card-bg: #16181d;
            --header-dark: #090a0d;
            --text-main: #f0f1f5;
            --text-dim: #9ca3af;
            --code-text: #a1a1aa;
            --accent-blue: #0070ba; 
            --accent-red: #ef4444;
            --border-line: #22252e;
            --border-radius: 6px;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { 
            padding: 12px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-line);
            gap: 15px;
        }
        .brand { display: flex; flex-direction: column; }
        h1 { font-size: 1.1rem; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        
        .storage-warning { 
            font-size: 0.8rem; 
            color: #ccc; 
            font-style: italic; 
            font-weight: 500;
            margin-top: 4px;
        }
        
        .actions-group { display: flex; gap: 8px; align-items: center; }

        .btn { 
            padding: 6px 14px; 
            border-radius: var(--border-radius); 
            font-weight: 600; 
            font-size: 0.7rem; 
            border: none; 
            cursor: pointer; 
            color: white; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            height: 32px;
        }
        .btn-download { background-color: #272a34; border: 1px solid var(--border-line); color: var(--text-dim); }
        .btn-paypal { background-color: var(--accent-blue); }
        .btn-clear { background: transparent; color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.3); }

        .main-layout { display: flex; flex: 1; padding: 15px; gap: 0; overflow: hidden; }
        .editors-column { display: flex; flex-direction: column; gap: 12px; height: 100%; width: 50%; min-width: 300px; }
        
        .resizer { width: 14px; cursor: col-resize; display: flex; justify-content: center; align-items: center; }
        .resizer::after { content: ""; width: 2px; height: 50px; background: var(--border-line); border-radius: 2px; }

        .editor-box { background: var(--card-bg); border-radius: var(--border-radius); flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border-line); }
        .editor-header { background: var(--header-dark); padding: 8px 15px; border-bottom: 1px solid var(--border-line); font-size: 0.6rem; font-weight: 800; color: var(--text-dim); letter-spacing: 1.5px; }

        .editor-container { position: relative; flex: 1; display: flex; }
        .line-numbers { width: 40px; padding: 15px 5px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #555; background: #0c0d11; border-right: 1px solid var(--border-line); user-select: none; line-height: 1.6; }

        textarea { 
            background: transparent; border: none; color: var(--code-text); 
            font-family: 'JetBrains Mono', monospace; font-size: 13px; 
            flex: 1; padding: 15px; resize: none; outline: none; 
            line-height: 1.6; tab-size: 2; white-space: pre;
        }

        .preview-side { flex: 1; height: 100%; display: flex; flex-direction: column; border-radius: var(--border-radius); border: 1px solid var(--border-line); overflow: hidden; }
        .tabs-bar { background: var(--header-dark); display: flex; align-items: center; padding-right: 15px; border-bottom: 1px solid var(--border-line); justify-content: space-between; height: 40px; }
        .tabs-wrapper { display: flex; align-items: center; overflow-x: auto; flex: 1; }
        .tab { padding: 0 15px; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid transparent; height: 40px; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent-blue); background: rgba(255,255,255,0.03); }
        .add-tab { font-size: 1.5rem; color: var(--text-dim); cursor: pointer; padding: 0 15px; }

        .eye-care-note { font-size: 0.7rem; font-style: italic; color: var(--text-dim); margin-right: 10px; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        @media (max-width: 900px) { .main-layout { flex-direction: column; } .editors-column, .preview-side { width: 100%; min-height: 400px; } .resizer { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Free Online Code Previewer</h1>
        <span class="storage-warning" id="storage-warning"></span>
    </div>
    <div class="actions-group">
        <button class="btn btn-clear" onclick="clearAllHistory()" title="Clear">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
        <button class="btn btn-download" id="btn-download" onclick="downloadCurrentTab()"></button>
        <a href="https://paypal.me/abenguche" target="_blank" class="btn btn-paypal" id="btn-paypal">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M20.067 8.478c.492.47.662 1.137.492 1.81-.777 3.078-2.926 4.846-6.103 4.846H11.6l-.793 4.19a.448.448 0 0 1-.44.365h-3.46a.18.18 0 0 1-.177-.213l2.52-13.431a.448.448 0 0 1 .44-.365h4.582c2.08 0 3.513.473 4.35 1.416.322.36.508.762.585 1.192.077.43.04.881-.11 1.39a4.73 4.73 0 0 1-.11 1.39zm-5.881.553c0-.105-.085-.19-.19-.19h-2.122l-.565 3.03h1.928c1.102 0 1.825-.568 2.062-1.503.14-.548.048-.962-.276-1.183a.952.952 0 0 0-.837-.154z"/></svg>
            <span id="txt-donate"></span>
        </a>
    </div>
</header>

<div class="main-layout" id="main-container">
    <div class="editors-column" id="left-side">
        <div class="editor-box">
            <div class="editor-header">HTML</div>
            <div class="editor-container">
                <div class="line-numbers" id="html-lines">1</div>
                <textarea id="html-code" spellcheck="false" oninput="updateLines('html')" onscroll="syncLines('html')"></textarea>
            </div>
        </div>
        <div class="editor-box">
            <div class="editor-header">CSS</div>
            <div class="editor-container">
                <div class="line-numbers" id="css-lines">1</div>
                <textarea id="css-code" spellcheck="false" oninput="updateLines('css')" onscroll="syncLines('css')"></textarea>
            </div>
        </div>
        <div class="editor-box">
            <div class="editor-header">JAVASCRIPT</div>
            <div class="editor-container">
                <div class="line-numbers" id="js-lines">1</div>
                <textarea id="js-code" spellcheck="false" oninput="updateLines('js')" onscroll="syncLines('js')"></textarea>
            </div>
        </div>
    </div>

    <div class="resizer" id="drag-bar"></div>

    <div class="preview-side">
        <div class="tabs-bar">
            <div class="tabs-wrapper" id="tabs-list"></div>
            <div class="controls-right" style="display:flex; align-items:center;">
                <span class="eye-care-note" id="eye-note"></span>
                <div onclick="toggleTheme()" style="cursor:pointer; display:flex;">
                    <svg id="theme-icon" width="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><path d="M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
                </div>
            </div>
        </div>
        <iframe id="preview-iframe"></iframe>
    </div>
</div>

<script>
    const isSpanish = (navigator.language || navigator.userLanguage).startsWith('es');
    const lang = isSpanish ? {
        warn: "Proyectos ligeros / Light projects only",
        clearMsg: "¿Borrar todo?",
        dl: "DESCARGAR", donate: "DONAR", note: "Modo oscuro:", proj: "Proyecto",
        html: "<h1>¡Hola Mundo!</h1>\n<button id='btn'>Haz clic aquí</button>", 
        css: "body { text-align: center; padding-top: 50px; }\nbutton { padding: 10px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 4px; }", 
        js: "document.getElementById('btn').onclick = () => alert('¡Funciona!');"
    } : {
        warn: "Light projects only / Proyectos ligeros",
        clearMsg: "Clear all?",
        dl: "DOWNLOAD", donate: "DONATE", note: "Dark mode:", proj: "Project",
        html: "<h1>Hello World!</h1>\n<button id='btn'>Click me</button>", 
        css: "body { text-align: center; padding-top: 50px; }\nbutton { padding: 10px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 4px; }", 
        js: "document.getElementById('btn').onclick = () => alert('It works!');"
    };

    document.getElementById('storage-warning').innerText = lang.warn;
    document.getElementById('btn-download').innerText = lang.dl;
    document.getElementById('txt-donate').innerText = lang.donate;
    document.getElementById('eye-note').innerText = lang.note;

    let tabs = JSON.parse(localStorage.getItem('tabs_v7')) || [];
    let activeTabId = localStorage.getItem('active_v7') || null;
    let isDarkMode = true;

    function updateLines(type) {
        const txt = document.getElementById(`${type}-code`);
        const lines = document.getElementById(`${type}-lines`);
        const count = txt.value.split('\n').length;
        lines.innerHTML = Array.from({length: count}, (_, i) => i + 1).join('<br>');
        saveAndPreview();
    }

    function syncLines(type) {
        document.getElementById(`${type}-lines`).scrollTop = document.getElementById(`${type}-code`).scrollTop;
    }

    function saveAndPreview() {
        const tab = tabs.find(t => t.id == activeTabId);
        if (tab) {
            tab.html = document.getElementById('html-code').value;
            tab.css = document.getElementById('css-code').value;
            tab.js = document.getElementById('js-code').value;
            localStorage.setItem('tabs_v7', JSON.stringify(tabs));
            updateIframe();
        }
    }

    function updateIframe() {
        const tab = tabs.find(t => t.id == activeTabId);
        if (!tab) return;
        const bg = isDarkMode ? "#1e1f20" : "#f5f5f5";
        const color = isDarkMode ? "#e3e3e3" : "#333";
        const doc = document.getElementById('preview-iframe').contentDocument;
        doc.open();
        doc.write(`<html><head><style>body{background:${bg};color:${color};margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;font-family:sans-serif;}${tab.css}</style></head><body>${tab.html}<script>${tab.js}<\/script></body></html>`);
        doc.close();
    }

    function renderTabs() {
        const list = document.getElementById('tabs-list');
        list.innerHTML = "";
        tabs.forEach(tab => {
            const el = document.createElement('div');
            el.className = `tab ${tab.id == activeTabId ? 'active' : ''}`;
            el.innerHTML = `<span>${tab.name}</span><div class='close-tab' onclick='closeTab(${tab.id}, event)'>✕</div>`;
            el.onclick = () => switchTab(tab.id);
            el.ondblclick = () => {
                const s = el.querySelector('span'); s.contentEditable = true; s.focus();
                document.execCommand('selectAll', false, null);
                s.onblur = () => { s.contentEditable = false; tab.name = s.innerText.trim() || "Project"; localStorage.setItem('tabs_v7', JSON.stringify(tabs)); renderTabs(); };
            };
            list.appendChild(el);
        });
        if (tabs.length < 5) {
            const add = document.createElement('div'); add.className = "add-tab"; add.innerText = "+"; add.onclick = createNewTab; list.appendChild(add);
        }
    }

    function createNewTab() {
        const id = Date.now();
        tabs.push({ id, name: `${lang.proj} ${tabs.length + 1}`, html: lang.html, css: lang.css, js: lang.js });
        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        localStorage.setItem('active_v7', id);
        const tab = tabs.find(t => t.id == id);
        
        // Si por alguna razón la pestaña guardada estaba vacía, inyectamos el ejemplo
        if(!tab.css) tab.css = lang.css;
        if(!tab.js) tab.js = lang.js;

        ['html', 'css', 'js'].forEach(type => {
            document.getElementById(`${type}-code`).value = tab[type];
            updateLines(type);
        });
        renderTabs();
        updateIframe();
    }

    function closeTab(id, e) {
        e.stopPropagation();
        tabs = tabs.filter(t => t.id != id);
        if (tabs.length === 0) createNewTab(); else switchTab(tabs[0].id);
    }

    function clearAllHistory() { if(confirm(lang.clearMsg)) { localStorage.clear(); location.reload(); } }
    function toggleTheme() { isDarkMode = !isDarkMode; updateIframe(); }
    
    const resizer = document.getElementById('drag-bar');
    const leftSide = document.getElementById('left-side');
    resizer.addEventListener('mousedown', () => {
        const doDrag = (e) => {
            let width = (e.clientX / window.innerWidth) * 100;
            if (width > 20 && width < 80) leftSide.style.width = width + '%';
        };
        const stopDrag = () => { document.removeEventListener('mousemove', doDrag); };
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', stopDrag);
    });

    document.querySelectorAll('textarea').forEach(txt => {
        txt.addEventListener('keydown', function(e) {
            if(e.key === 'Tab') {
                e.preventDefault();
                const s = this.selectionStart;
                this.value = this.value.substring(0,s) + "  " + this.value.substring(this.selectionEnd);
                this.selectionEnd = s + 2;
                updateLines(this.id.split('-')[0]);
            }
        });
    });

    if (tabs.length === 0) createNewTab(); else switchTab(activeTabId || tabs[0].id);
</script>
</body>
</html>
