<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuar Code Previewer</title>
    <style>
        /* Estilo inspirado en Gemini Oscuro */
        :root {
            --bg-color: #131314;
            --card-bg: #1e1f20;
            --text-main: #e3e3e3;
            --text-dim: #b4b4b4;
            --accent-blue: #0070ba; /* Azul PayPal */
            --border-radius: 16px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Encabezado */
        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0;
            color: var(--text-main);
        }

        .btn-paypal {
            background-color: var(--accent-blue);
            color: white;
            padding: 10px 24px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .btn-paypal:hover {
            opacity: 0.9;
        }

        /* Contenedor Principal */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 30px 30px 30px;
            flex: 1;
            overflow: hidden;
        }

        /* Editores a la izquierda */
        .editors-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .editor-box {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        textarea {
            background: transparent;
            border: none;
            color: #4af626; /* Color código tipo terminal */
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 120px;
        }

        /* Vista previa a la derecha */
        .preview-column {
            background: white; /* El lienzo de dibujo suele ser blanco */
            border-radius: var(--border-radius);
            overflow: hidden;
            display: flex;
        }

        #preview-iframe {
            width: 100%;
            border: none;
            background: white;
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Anuar Code Previewer</h1>
    <a href="https://www.paypal.me/TU_USUARIO" target="_blank" class="btn-paypal">DONAR CON PAYPAL</a>
</header>

<div class="main-layout">
    <div class="editors-column">
        <div class="editor-box">
            <div class="label">HTML</div>
            <textarea id="html-code" placeholder="<div>Hola</div>"></textarea>
        </div>
        
        <div class="editor-box">
            <div class="label">CSS</div>
            <textarea id="css-code" placeholder="body { color: blue; }"></textarea>
        </div>

        <div class="editor-box">
            <div class="label">JavaScript</div>
            <textarea id="js-code" placeholder="console.log('Hola');"></textarea>
        </div>
    </div>

    <div class="preview-column">
        <iframe id="preview-iframe"></iframe>
    </div>
</div>

<script>
    const htmlEditor = document.getElementById('html-code');
    const cssEditor = document.getElementById('css-code');
    const jsEditor = document.getElementById('js-code');
    const preview = document.getElementById('preview-iframe');

    function update() {
        const doc = preview.contentDocument || preview.contentWindow.document;
        doc.open();
        doc.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <style>${cssEditor.value}</style>
            </head>
            <body>
                ${htmlEditor.value}
                <script>${jsEditor.value}<\/script>
            </body>
            </html>
        `);
        doc.close();
    }

    // Escuchar cambios en los tres campos
    htmlEditor.addEventListener('input', update);
    cssEditor.addEventListener('input', update);
    jsEditor.addEventListener('input', update);

    // Carga inicial de ejemplo
    htmlEditor.value = "<h1>¡Bienvenido!</h1>\n<p>Prueba a cambiar el código a la izquierda.</p>";
    cssEditor.value = "body { \n  font-family: sans-serif; \n  text-align: center; \n  padding-top: 50px; \n  color: #333;\n}";
    update();
</script>

</body>
</html>
