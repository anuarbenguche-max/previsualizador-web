<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online Code Previewer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* [COLORES Y VARIABLES] */
        :root {
            --bg-color: #131314;
            --card-bg: #1e1f20;
            --header-dark: #0f0f0f;
            --text-main: #e3e3e3;
            --text-dim: #b4b4b4;
            --code-text: #a0a0a0;
            --accent-blue: #0070ba; 
            --border-line: #2a2a2a;
            --border-radius: 8px;
            /* Sombras sutiles */
            --shadow-soft: 0 4px 15px rgba(0, 0, 0, 0.5);
            --shadow-strong: 0 8px 30px rgba(0, 0, 0, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Lato', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .actions-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* [BOTONES] */
        .btn {
            padding: 10px 22px;
            text-decoration: none;
            border-radius: var(--border-radius);
            font-weight: 700;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-soft); /* Sombra en botones */
        }

        .btn-download { background-color: #303136; color: var(--text-main); border: 1px solid var(--border-line); }
        .btn-paypal { background-color: var(--accent-blue); color: white; }

        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-strong);
            filter: brightness(1.1);
        }

        /* [LAYOUT PRINCIPAL] */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px; /* Un poco más de espacio para que luzcan las sombras */
            padding: 0 30px 30px 30px;
            flex: 1;
            overflow: hidden;
        }

        .editors-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
        }

        /* [CAJAS CON SOMBRAS] */
        .editor-box {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-line);
            box-shadow: var(--shadow-soft); /* Sombra sutil */
            transition: box-shadow 0.3s ease;
        }

        .editor-box:focus-within {
            box-shadow: var(--shadow-strong); /* La sombra se vuelve más fuerte al escribir */
            border-color: #444;
        }

        .editor-header {
            background: var(--header-dark);
            padding: 12px 15px;
            border-bottom: 2px solid var(--border-line);
        }

        .label {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        textarea {
            background: transparent;
            border: none;
            color: var(--code-text);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            flex: 1;
            padding: 15px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        /* [VISTA PREVIA CON SOMBRA] */
        .preview-column {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            height: 100%;
            border: 1px solid var(--border-line);
            box-shadow: var(--shadow-soft);
        }

        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; overflow-y: auto; }
            body { overflow-y: auto; height: auto; }
            .preview-column { min-height: 450px; order: -1; }
            header { text-align: center; justify-content: center; }
            .actions-group { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <h1>Free Online Code Previewer</h1>
    <div class="actions-group">
        <button class="btn btn-download" onclick="downloadIndex()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            DESCARGAR .HTML
        </button>

        <a href="https://paypal.me/abenguche" target="_blank" class="btn btn-paypal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg>
            DONAR CON PAYPAL
        </a>
    </div>
</header>

<div class="main-layout">
    <div class="editors-column">
        <div class="editor-box">
            <div class="editor-header"><div class="label">HTML</div></div>
            <textarea id="html-code" placeholder="Escribe HTML..."></textarea>
        </div>
        <div class="editor-box">
            <div class="editor-header"><div class="label">CSS</div></div>
            <textarea id="css-code" placeholder="Escribe CSS..."></textarea>
        </div>
        <div class="editor-box">
            <div class="editor-header"><div class="label">JAVASCRIPT</div></div>
            <textarea id="js-code" placeholder="Escribe JS..."></textarea>
        </div>
    </div>
    <div class="preview-column">
        <iframe id="preview-iframe"></iframe>
    </div>
</div>

<script>
    const htmlEditor = document.getElementById('html-code');
    const cssEditor = document.getElementById('css-code');
    const jsEditor = document.getElementById('js-code');
    const preview = document.getElementById('preview-iframe');

    function update() {
        const doc = preview.contentDocument || preview.contentWindow.document;
        doc.open();
        doc.write(`<!DOCTYPE html><html><head><style>${cssEditor.value}</style></head><body>${htmlEditor.value}<script>${jsEditor.value}<\/script></body></html>`);
        doc.close();
    }

    [htmlEditor, cssEditor, jsEditor].forEach(el => el.addEventListener('input', update));

    function downloadIndex() {
        const fullCode = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><style>${cssEditor.value}</style></head><body>${htmlEditor.value}<script>${jsEditor.value}<\/script></body></html>`;
        const blob = new Blob([fullCode], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'index.html';
        a.click();
        URL.revokeObjectURL(url);
    }

    htmlEditor.value = "<h1>Hola Anuar</h1>\n<p>Mira las sombras en los bordes de estas cajas.</p>";
    cssEditor.value = "body { font-family: 'Lato', sans-serif; text-align: center; padding-top: 50px; color: #333; }";
    update();
</script>

</body>
</html>
