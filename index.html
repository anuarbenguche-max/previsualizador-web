<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online Code Previewer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1014;
            --card-bg: #16181d;
            --header-dark: #090a0d;
            --text-main: #f0f1f5;
            --text-dim: #9ca3af;
            --code-text: #a1a1aa;
            --accent-blue: #3b82f6; 
            --accent-red: #ef4444;
            --border-line: #22252e;
            --border-radius: 6px;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-line); }
        h1 { font-size: 1.1rem; font-weight: 800; margin: 0; letter-spacing: -0.8px; }
        
        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .actions-group { display: flex; gap: 10px; }

        .btn { padding: 8px 16px; border-radius: var(--border-radius); font-weight: 600; font-size: 0.75rem; border: none; cursor: pointer; color: white; transition: 0.2s; }
        .btn-download { background-color: #272a34; border: 1px solid var(--border-line); color: var(--text-dim); }
        .btn-paypal { background-color: var(--accent-blue); }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; flex: 1; overflow: hidden; }

        .editors-column { display: flex; flex-direction: column; gap: 12px; height: 100%; }
        .editor-box { background: var(--card-bg); border-radius: var(--border-radius); flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border-line); }
        .editor-header { background: var(--header-dark); padding: 8px 12px; border-bottom: 1px solid var(--border-line); }
        .label { font-size: 0.55rem; color: var(--text-dim); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        
        textarea { background: transparent; border: none; color: var(--code-text); font-family: 'JetBrains Mono', monospace; font-size: 13px; flex: 1; padding: 15px; resize: none; outline: none; line-height: 1.7; }

        .preview-container { display: flex; flex-direction: column; height: 100%; border-radius: var(--border-radius); border: 1px solid var(--border-line); overflow: hidden; position: relative; }
        .tabs-bar { background: var(--header-dark); display: flex; align-items: center; padding-right: 15px; border-bottom: 1px solid var(--border-line); justify-content: space-between; }
        
        .tabs-wrapper { display: flex; align-items: center; overflow-x: auto; flex: 1; }
        .tab { padding: 10px 15px; color: var(--text-dim); font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid transparent; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent-blue); background: rgba(255,255,255,0.03); }
        
        .close-tab { font-size: 10px; opacity: 0.3; padding: 2px 4px; border-radius: 3px; transition: 0.2s; }
        .close-tab:hover { background: var(--accent-red); color: white; opacity: 1; }
        
        .add-tab { font-size: 1.4rem; color: var(--text-dim); cursor: pointer; padding: 0 12px; transition: 0.2s; }
        .add-tab:hover { color: white; transform: scale(1.1); }

        .controls-right { display: flex; align-items: center; gap: 12px; }
        .eye-care-note { font-size: 0.65rem; font-style: italic; color: var(--text-dim); }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <h1>Free Online Code Previewer</h1>
    <div class="header-right">
        <div class="actions-group">
            <button class="btn btn-download" id="btn-download" onclick="downloadCurrentTab()"></button>
            <a href="https://paypal.me/abenguche" target="_blank" class="btn btn-paypal" id="btn-paypal"></a>
        </div>
    </div>
</header>

<div class="main-layout">
    <div class="editors-column">
        <div class="editor-box">
            <div class="editor-header"><div class="label">HTML</div></div>
            <textarea id="html-code" oninput="saveAndPreview()"></textarea>
        </div>
        <div class="editor-box">
            <div class="editor-header"><div class="label">CSS</div></div>
            <textarea id="css-code" oninput="saveAndPreview()"></textarea>
        </div>
        <div class="editor-box">
            <div class="editor-header"><div class="label">JAVASCRIPT</div></div>
            <textarea id="js-code" oninput="saveAndPreview()"></textarea>
        </div>
    </div>

    <div class="preview-container" id="preview-wrapper">
        <div class="tabs-bar">
            <div class="tabs-wrapper" id="tabs-list"></div>
            <div class="controls-right">
                <span class="eye-care-note" id="eye-note"></span>
                <div class="theme-btn" onclick="toggleTheme()" style="cursor:pointer">
                    <svg id="theme-icon" width="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><path d="M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
                </div>
            </div>
        </div>
        <iframe id="preview-iframe"></iframe>
    </div>
</div>

<script>
    const isSpanish = (navigator.language || navigator.userLanguage).startsWith('es');
    const lang = isSpanish ? {
        dl: "DESCARGAR .HTML", donate: "DONAR", note: "Cuidamos tus ojos / Dark mode:", proj: "Proyecto", hello: "<h1>Hola mundo</h1>"
    } : {
        dl: "DOWNLOAD .HTML", donate: "DONATE", note: "Protecting your eyes / Modo oscuro:", proj: "Project", hello: "<h1>Hello world</h1>"
    };

    document.getElementById('btn-download').innerText = lang.dl;
    document.getElementById('btn-paypal').innerText = lang.donate;
    document.getElementById('eye-note').innerText = lang.note;

    let tabs = JSON.parse(localStorage.getItem('previewer_tabs')) || [];
    let activeTabId = localStorage.getItem('previewer_active_tab') || null;
    let isDarkMode = true;

    function saveAndPreview() {
        const tab = tabs.find(t => t.id == activeTabId);
        if (tab) {
            tab.html = document.getElementById('html-code').value;
            tab.css = document.getElementById('css-code').value;
            tab.js = document.getElementById('js-code').value;
            localStorage.setItem('previewer_tabs', JSON.stringify(tabs));
            updateIframe();
        }
    }

    function updateIframe() {
        const tab = tabs.find(t => t.id == activeTabId);
        if (!tab) return;
        const preview = document.getElementById('preview-iframe');
        const doc = preview.contentDocument || preview.contentWindow.document;
        const bg = isDarkMode ? "#1e1f20" : "#f5f5f5";
        const color = isDarkMode ? "#e3e3e3" : "#333";
        
        document.getElementById('preview-wrapper').style.background = bg;

        doc.open();
        doc.write(`
            <html>
            <head>
                <style>
                    body { 
                        background: ${bg}; 
                        color: ${color}; 
                        margin: 0; 
                        min-height: 100vh; 
                        display: flex; 
                        justify-content: center; 
                        align-items: center; 
                        font-family: 'Inter', sans-serif;
                        transition: background 0.3s, color 0.3s;
                    }
                    ${tab.css}
                </style>
            </head>
            <body>
                <div>${tab.html}</div>
                <script>${tab.js}<\/script>
            </body>
            </html>
        `);
        doc.close();
    }

    function renderTabs() {
        const list = document.getElementById('tabs-list');
        list.innerHTML = "";
        tabs.forEach(tab => {
            const el = document.createElement('div');
            el.className = `tab ${tab.id == activeTabId ? 'active' : ''}`;
            el.innerHTML = `<span onblur="updateTabName(${tab.id}, this)">${tab.name}</span><div class="close-tab" onclick="closeTab(${tab.id}, event)">✕</div>`;
            el.onclick = () => switchTab(tab.id);
            el.ondblclick = (e) => {
                const span = el.querySelector('span');
                span.contentEditable = true;
                span.focus();
                document.execCommand('selectAll', false, null);
            };
            list.appendChild(el);
        });
        if (tabs.length < 5) {
            const add = document.createElement('div');
            add.className = "add-tab";
            add.innerText = "+";
            add.onclick = createNewTab;
            list.appendChild(add);
        }
    }

    function updateTabName(id, el) {
        el.contentEditable = false;
        const tab = tabs.find(t => t.id == id);
        if (tab) tab.name = el.innerText.trim() || "Project";
        localStorage.setItem('previewer_tabs', JSON.stringify(tabs));
        renderTabs();
    }

    function createNewTab() {
        const id = Date.now();
        tabs.push({ id, name: `${lang.proj} ${tabs.length + 1}`, html: lang.hello, css: "", js: "" });
        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        localStorage.setItem('previewer_active_tab', id);
        const tab = tabs.find(t => t.id == id);
        document.getElementById('html-code').value = tab.html;
        document.getElementById('css-code').value = tab.css;
        document.getElementById('js-code').value = tab.js;
        renderTabs();
        updateIframe();
    }

    function closeTab(id, e) {
        e.stopPropagation();
        tabs = tabs.filter(t => t.id != id);
        if (tabs.length === 0) createNewTab();
        else switchTab(tabs[0].id);
    }

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        updateIframe();
    }

    function downloadCurrentTab() {
        const tab = tabs.find(t => t.id == activeTabId);
        const code = `<!DOCTYPE html><html><head><style>body{background:${isDarkMode?'#1e1f20':'#f5f5f5'};color:${isDarkMode?'#e3e3e3':'#333'};display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:sans-serif;}${tab.css}</style></head><body>${tab.html}<script>${tab.js}<\/script></body></html>`;
        const blob = new Blob([code], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${tab.name}.html`;
        a.click();
    }

    if (tabs.length === 0) createNewTab(); else switchTab(activeTabId || tabs[0].id);
</script>
</body>
</html>
